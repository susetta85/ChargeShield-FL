# ChargeShield-FL — Cluster Urban Configuration
# FL Client: urban (NVFLARE site)
# Purdue L1/L2: 3 stazioni di ricarica urbane (media potenza)

node:
  node_id: urban-01
  cluster_id: urban
  site_name: urban
  protocol: OCPP_16
  max_power_kw: 22
  dataset_path: /app/datasets/acn/

ml:
  input_dim: 7
  lr: 0.001
  epochs: 3
  batch_size: 32
  proximal_mu: 0.01

charging_stations:
  - station_id: urban-01
    protocol: OCPP_16
    max_power_kw: 22
  - station_id: urban-02
    protocol: OCPP_16
    max_power_kw: 22
  - station_id: urban-03
    protocol: OCPP_16
    max_power_kw: 22
